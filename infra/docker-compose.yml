services:

  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: configent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d configent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..                    # repo root — preserves monorepo path depth
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../.env                # ANTHROPIC_API_KEY, VOYAGE_API_KEY, etc.
    environment:
      # Override the localhost URL from .env so the API can reach the db service
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/configent
      DEV_CONFIG_RELOAD: "0"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Web ────────────────────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Internal Docker network name for the API service
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
